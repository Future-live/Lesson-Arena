name: Deploy to Tencent CloudBase

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudbase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy CloudBase
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
      TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
      TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
      CLOUDBASE_ENV_FILE: ${{ secrets.CLOUDBASE_ENV_FILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Validate secrets
        run: |
          test -n "$TCB_ENV_ID" || (echo "Missing GitHub secret: TCB_ENV_ID" && exit 1)
          test -n "$TCB_SECRET_ID" || (echo "Missing GitHub secret: TCB_SECRET_ID" && exit 1)
          test -n "$TCB_SECRET_KEY" || (echo "Missing GitHub secret: TCB_SECRET_KEY" && exit 1)
          test -n "$CLOUDBASE_ENV_FILE" || (echo "Missing GitHub secret: CLOUDBASE_ENV_FILE" && exit 1)

      - name: Write CloudBase environment file
        run: |
          printf '%s\n' "$CLOUDBASE_ENV_FILE" > .env.cloudbase
          if ! grep -q '^CLOUDBASE_ENV_ID=' .env.cloudbase; then
            printf '\nCLOUDBASE_ENV_ID=%s\n' "$TCB_ENV_ID" >> .env.cloudbase
          fi
          if ! grep -q '^VITE_API_BASE_URL=' .env.cloudbase; then
            printf '\nVITE_API_BASE_URL=/api\n' >> .env.cloudbase
          fi
          if ! grep -q '^CLOUDBASE_API_BASE_URL=' .env.cloudbase; then
            printf 'CLOUDBASE_API_BASE_URL=/api\n' >> .env.cloudbase
          fi
          file_env_id="$(sed -n 's/^CLOUDBASE_ENV_ID=//p' .env.cloudbase | tail -n 1)"
          test "$file_env_id" = "$TCB_ENV_ID" || (echo "CLOUDBASE_ENV_ID in CLOUDBASE_ENV_FILE does not match TCB_ENV_ID" && exit 1)

      - name: Login to CloudBase
        run: |
          if command -v tcb >/dev/null 2>&1; then
            tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"
          else
            cloudbase login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"
          fi

      - name: Deploy frontend and backend
        run: ./scripts/cloudbase-deploy.sh
